{{- if and .Values.gateway.enabled (index .Values "seaweedfs" "master" "enabled") }}
# Expose the SeaweedFS master status UI through the shared ingress Gateway. Same shape as the
# monitoring chart's grafana/prometheus routes: the HTTPRoute sits next to the master Service
# (this namespace, no ReferenceGrant needed) and attaches cross-namespace to the `internal`
# Gateway. TLS is terminated by the Gateway's wildcard cert; reachability is bounded by the
# gateway's L3 allow-list. Only the master UI is routed — never the S3/filer/volume data ports.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-master
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-seaweedfs
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.gateway.serviceName }}
          port: {{ .Values.gateway.servicePort }}
{{- end }}
