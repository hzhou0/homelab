# homelab-seaweedfs values
#
# Upstream seaweedfs subchart, configured as hypha's hot cache tier: no redundancy, latency-first,
# all data on node-local NVMe via topolvm-provisioner. hypha reaches this over the S3 API only, so
# nothing here is coupled to the proxy — swap SeaweedFS for any S3 cache and hypha is unaffected.
seaweedfs:
  enabled: true

  global:
    # No redundancy anywhere. Durability is hypha's encrypted copy on the remote S3 endpoint, not
    # local replication — matches the homelab's "backups, not replication" storage philosophy.
    enableReplication: false
    replicationPlacement: "000"

  master:
    enabled: true
    replicas: 1
    defaultReplication: "000"
    # Don't pre-allocate volume files: keeps LV usage proportional to real data so TopoLVM's
    # capacity tracking stays honest.
    volumePreallocate: false
    nodeSelector: |
      vg: nvme
    data:
      type: persistentVolumeClaim
      storageClass: topolvm-provisioner
      size: 1Gi

  # Shared defaults for the per-node volume groups below (`enabled: false` disables the chart's
  # own generic group).
  volume:
    enabled: false
    # On-disk index instead of the default in-memory one, whose RAM grows ~20 bytes/object
    # unbounded — these N100 nodes have little to spare. leveldbLarge is the fastest leveldb tier.
    index: leveldbLarge

  volumes:
    k3s-server:
      replicas: 1
      nodeSelector: |
        vg: nvme
        kubernetes.io/hostname: k3s-server
      dataDirs:
        - name: data1
          type: persistentVolumeClaim
          storageClass: topolvm-provisioner
          # vg-nvme on this node is 853.87Gi (topolvm_volumegroup_size_bytes); leave 200Gi free.
          size: 650Gi
          maxVolumes: 0
    k3s-compute-cb3c65:
      replicas: 1
      nodeSelector: |
        vg: nvme
        kubernetes.io/hostname: k3s-compute-cb3c65
      dataDirs:
        - name: data1
          type: persistentVolumeClaim
          storageClass: topolvm-provisioner
          # vg-nvme on this node is 376.94Gi (topolvm_volumegroup_size_bytes); leave 200Gi free.
          size: 175Gi
          maxVolumes: 0

  filer:
    enabled: true
    replicas: 1
    nodeSelector: |
      vg: nvme
    data:
      type: persistentVolumeClaim
      storageClass: topolvm-provisioner
      size: 10Gi

  # Auth off — the S3 surface is plaintext; fenced by accessGrants below.
  s3:
    enabled: true
    port: 8333
    enableAuth: false

# Gateway-routed UIs. The filer UI browses object *contents* (plaintext); the raw S3/volume
# ports stay unrouted.
gateway:
  enabled: true
  name: internal
  namespace: cilium-gateway
  routes:
    - name: seaweedfs-master
      hostname: seaweedfs.internal.haustorium.net
      serviceName: homelab-seaweedfs-master
      servicePort: 9333
    - name: seaweedfs-filer
      hostname: seaweedfs-filer.internal.haustorium.net
      serviceName: homelab-seaweedfs-filer
      servicePort: 8888

# Cross-namespace allow grants for the plaintext surfaces (one CiliumNetworkPolicy each). Scoped by
# source NAMESPACE only — a pod can self-apply any label, so labels are not a trust boundary; the
# namespace (gated by who can create pods there) is. Namespaces need not exist yet — a grant matches
# nothing until one does. hypha is the only client today: S3 for data, master + volume status APIs
# for its optional `seaweedfs` cache-usage source. The filer stays internal-only, so it has no grant.
#
# target: `component: <label>`, or `volumeServers: true` for every per-node volume group.
accessGrants:
  - name: hypha-s3
    target: { component: s3 }
    ports: [8333]
    fromNamespaces: [hypha]
  - name: hypha-master
    target: { component: master }
    ports: [9333, 19333]          # 19333 = gRPC, for weed shell (volume.vacuum)
    fromNamespaces: [hypha]
  - name: hypha-volume
    target: { volumeServers: true }
    ports: [8080]
    fromNamespaces: [hypha]