{{- if and .Values.prometheusGateway.enabled (index .Values "kube-prometheus-stack" "prometheus" "enabled") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-monitoring
spec:
  parentRefs:
    - name: {{ .Values.prometheusGateway.name }}
      namespace: {{ .Values.prometheusGateway.namespace }}
  hostnames:
    - {{ .Values.prometheusGateway.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.prometheusGateway.serviceName }}
          port: {{ .Values.prometheusGateway.servicePort }}
{{- end }}
