apiVersion: v2
name: homelab-monitoring
description: >-
  Prometheus + Grafana for the homelab k3s cluster, installed by cluster-admin into the
  monitoring namespace. Wraps the upstream prometheus-community kube-prometheus-stack
  (Prometheus Operator, Prometheus, Alertmanager, Grafana, node-exporter, kube-state-metrics).
  Foundational like cilium/cert-manager: it ships CRDs (Prometheus, ServiceMonitor, ...) and
  needs cluster-scoped RBAC to discover and scrape targets across all namespaces, so the
  autonomous operator cannot install it and it lives in its own namespace rather than an
  app-*/tool-* one. On top it ships HTTPRoutes that expose Grafana and Prometheus through the
  shared Cilium ingress Gateway.
type: application
version: 0.1.0
appVersion: "v0.92.0"
keywords:
  - prometheus
  - grafana
  - kube-prometheus-stack
  - monitoring
  - observability
  - homelab
dependencies:
  - name: kube-prometheus-stack
    version: "87.3.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
