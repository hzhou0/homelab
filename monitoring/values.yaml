# homelab-monitoring values

# Upstream kube-prometheus-stack subchart values.
kube-prometheus-stack:
  enabled: true

  # CRDs (Prometheus, ServiceMonitor, PrometheusRule, ...) are owned by this release. They are
  # cluster-scoped, which is why this chart is cluster-admin territory, not the operator's.
  crds:
    enabled: true

  prometheus:
    enabled: true
    prometheusSpec:
      # Keep the TSDB and the rest of the stack off the reclaimable spot node
      # (node.kubernetes.io/capacity-type=spot); node-exporter (a DaemonSet) still runs there.
      affinity: &avoidSpot
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.kubernetes.io/capacity-type
                    operator: NotIn
                    values: [spot]
      replicas: 1
      retention: 15d
      # Discover ServiceMonitors/PodMonitors/PrometheusRules in ALL namespaces, not just those
      # carrying this release's labels. Without this, app-*/tool-* workloads that ship their own
      # ServiceMonitor would be invisible to Prometheus.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      # Lower the Go GC threshold from the default 100 (collect when the heap has grown 100%) to 40,
      # so Prometheus collects earlier and settles at a smaller resident heap. This is a soft knob,
      # not a memory limit: it trades a little CPU (which is near-idle here) for lower steady-state
      # memory and cannot OOMKill the process.
      containers:
        - name: prometheus
          env:
            - name: GOGC
              value: "40"
      # Default is emptyDir (metrics are lost on pod restart). Point storageClassName at
      # topolvm-provisioner to make Prometheus durable; left unset to avoid assuming a storage
      # class exists at install time.
      # storageSpec:
      #   volumeClaimTemplate:
      #     spec:
      #       storageClassName: topolvm-provisioner
      #       accessModes: ["ReadWriteOnce"]
      #       resources:
      #         requests:
      #           storage: 20Gi

  alertmanager:
    alertmanagerSpec:
      affinity: *avoidSpot
      replicas: 1

  # kube-state-metrics and the Prometheus operator are Deployments with no node pinning of their
  # own; keep them off spot too (the node-exporter DaemonSet is intentionally left to run there).
  kube-state-metrics:
    affinity: *avoidSpot

  prometheusOperator:
    affinity: *avoidSpot

  grafana:
    enabled: true
    affinity: *avoidSpot
    # See GOGC note on prometheusSpec above: collect earlier for a smaller heap, no hard limit. Only
    # the grafana container is Go; the two k8s-sidecar (Python) containers ignore this.
    env:
      GOGC: "40"
    # Exposed via the shared Cilium Gateway, so the subchart's own Ingress is off.
    ingress:
      enabled: false
    # adminPassword defaults to upstream "prom-operator"; override out-of-git.
    grafana.ini:
      server:
        root_url: "https://grafana.internal.haustorium.net"
      # No Grafana login: every visitor is an anonymous Admin and the login form is hidden. Safe
      # only because reachability is restricted at the network edge, not by Grafana auth — drop
      # this block to restore the normal login.
      auth.anonymous:
        enabled: true
        org_role: Admin
      auth:
        disable_login_form: true

gateway:
  enabled: true
  # Must match gateway.name / gateway.namespace in the homelab-cilium chart.
  name: internal
  namespace: cilium-gateway
  hostname: grafana.internal.haustorium.net
  # Grafana Service created by the subchart: <release>-grafana on port 80. Default assumes the
  # release is named `homelab-monitoring`.
  serviceName: homelab-monitoring-grafana
  servicePort: 80

# Prometheus has no built-in auth.
prometheusGateway:
  enabled: true
  name: internal
  namespace: cilium-gateway
  hostname: prometheus.internal.haustorium.net
  # Service created by the kube-prometheus-stack subchart: <release>-kube-pr-prometheus on the
  # "http-web" port. Default assumes the release is named `homelab-monitoring`.
  serviceName: homelab-monitoring-kube-pr-prometheus
  servicePort: 9090
