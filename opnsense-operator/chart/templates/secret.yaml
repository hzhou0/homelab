{{- if not .Values.opnsense.existingSecret }}
{{- if or (not .Values.opnsense.apiKey) (not .Values.opnsense.apiSecret) }}
{{- fail "opnsense.apiKey and opnsense.apiSecret are required unless opnsense.existingSecret is set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opnsense-operator.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opnsense-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPNSENSE_API_KEY: {{ .Values.opnsense.apiKey | quote }}
  OPNSENSE_API_SECRET: {{ .Values.opnsense.apiSecret | quote }}
{{- end }}
