apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "opnsense-operator.fullname" . }}
  labels:
    {{- include "opnsense-operator.labels" . | nindent 4 }}
rules:
  # Source objects: read, and patch metadata (finalizers + status annotations).
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways/finalizers"]
    verbs: ["update"]
  # Surface reconcile outcomes as Events.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "opnsense-operator.fullname" . }}
  labels:
    {{- include "opnsense-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "opnsense-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "opnsense-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Leader-election lease lives in the operator's own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opnsense-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opnsense-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opnsense-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opnsense-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "opnsense-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "opnsense-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
