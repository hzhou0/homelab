replicaCount: 1

image:
  repository: ghcr.io/hzhou0/opnsense-operator
  # tag defaults to the chart appVersion when empty.
  tag: "sha-57db539"
  pullPolicy: IfNotPresent

opnsense:
  url: "https://10.0.0.1"
  wanInterface: "wan"
  insecureTLS: true
  # Comma-separated DNS zones the operator may manage. Empty allows any zone.
  managedDomains: "internal.haustorium.net"

  # Either reference an existing Secret holding OPNSENSE_API_KEY / OPNSENSE_API_SECRET,
  # or set apiKey/apiSecret to have the chart create the Secret.
  existingSecret: "opnsense-operator-creds"

leaderElect: true

serviceAccount:
  name: opnsense-operator

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
