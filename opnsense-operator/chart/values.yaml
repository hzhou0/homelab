replicaCount: 1

image:
  repository: ghcr.io/hzhou0/opnsense-operator
  tag: "0.1.2"
  pullPolicy: IfNotPresent

opnsense:
  url: "https://10.0.0.1"
  wanInterface: "wan"
  insecureTLS: true
  # Comma-separated DNS zones the operator may manage. Empty allows any zone.
  managedDomains: "internal.haustorium.net"

  existingSecret: "opnsense-operator-creds"

leaderElect: true

serviceAccount:
  name: opnsense-operator

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
# Keep the singleton operator off the reclaimable spot node (node.kubernetes.io/capacity-type=spot).
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node.kubernetes.io/capacity-type
              operator: NotIn
              values: [spot]
