# homelab-cert-manager values

cert-manager:
  enabled: true
  crds:
    enabled: true
  replicaCount: 1
  webhook:
    replicaCount: 1
  cainjector:
    replicaCount: 1

# Let's Encrypt ClusterIssuer solving DNS-01 via Cloudflare. Issues a publicly-trusted wildcard
# cert for *.internal.haustorium.net without inbound reachability (only DNS zone access needed).
acme:
  enabled: true
  email: "henryzhou000@gmail.com"
  server: "https://acme-v02.api.letsencrypt.org/directory"
  # Must match gateway.issuerName in the homelab-cilium chart.
  issuerName: letsencrypt-cloudflare
  privateKeySecretName: letsencrypt-cloudflare-account-key

# Cloudflare API token with Zone:DNS:Edit on haustorium.net. The Secret must live in this
# release's namespace (cert-manager) — ClusterIssuer resolves apiTokenSecretRef from there.
cloudflare:
  existingSecret: "cloudflare-api-token"
  secretKey: api-token
