# homelab-cert-manager values

cert-manager:
  enabled: true
  crds:
    enabled: true
  replicaCount: 1
  webhook:
    replicaCount: 1
  cainjector:
    replicaCount: 1

# DNS-01 (not HTTP-01) so no inbound reachability is needed — only DNS zone access.
acme:
  enabled: true
  email: "henryzhou000@gmail.com"
  server: "https://acme-v02.api.letsencrypt.org/directory"
  # Must match gateway.issuerName in the homelab-cilium chart.
  issuerName: letsencrypt-cloudflare
  privateKeySecretName: letsencrypt-cloudflare-account-key

# Token needs Zone:DNS:Edit on haustorium.net. The Secret must live in this release's namespace
# — ClusterIssuer resolves apiTokenSecretRef from there.
cloudflare:
  existingSecret: "cloudflare-api-token"
  secretKey: api-token
