{{- if and .Values.cloudflare.apiToken (not .Values.cloudflare.existingSecret) }}
# Cloudflare API token Secret (created only when a token is supplied inline AND no existing
# Secret is referenced). Lives in the release namespace so the ClusterIssuer's DNS-01 solver
# can resolve it. Prefer pre-creating this Secret out-of-band and setting cloudflare.existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.cloudflare.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cert-manager
type: Opaque
stringData:
  {{ .Values.cloudflare.secretKey }}: {{ .Values.cloudflare.apiToken | quote }}
{{- end }}
