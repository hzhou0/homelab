{{- if .Values.acme.enabled }}
{{- $tokenSecret := .Values.cloudflare.existingSecret | default .Values.cloudflare.secretName }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.acme.issuerName }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cert-manager
spec:
  acme:
    email: {{ .Values.acme.email | quote }}
    server: {{ .Values.acme.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.acme.privateKeySecretName }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ $tokenSecret }}
              key: {{ .Values.cloudflare.secretKey }}
{{- end }}
