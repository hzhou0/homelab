apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: test-clusterrole
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: test-netpol
  namespace: app-test
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: test-quota
  namespace: app-test
spec:
  hard:
    pods: "100"
---
# Platform ConfigMap the operator must not modify (namespace default, name runtime-profiles)
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-profiles
  namespace: default
data:
  go.cpuMin: "1"
