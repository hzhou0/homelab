# homelab-platform values

# Kyverno engine (subchart). Single replicas for the N100 nodes.
kyverno:
  enabled: true
  admissionController:
    replicas: 1
  backgroundController:        # required for `generate` + `synchronize`
    replicas: 1
  reportsController:
    enabled: false
  cleanupController:
    enabled: false
  # CRDs are applied out-of-band via ./platform/install-crds.sh — Kyverno's CRD source exceeds
  # Kubernetes' 1MB release Secret limit when bundled. install:false prunes those subcharts.
  crds:
    install: false

# Toggle off to install Kyverno alone (see README for CRD ordering caveat on fresh clusters).
policies:
  enabled: true
  validationAction: Deny

operator:
  enabled: true
  namespace: tool-operator
  serviceAccountName: homelab-operator

prefixes:
  app: "app-"
  tool: "tool-"

runtimeLabel: "homelab.lab/runtime"

runtimeProfiles:
  static: { cpuMin: "10m",  cpuMax: "250m",  memMin: "16Mi",  memMax: "128Mi" }
  go:     { cpuMin: "50m",  cpuMax: "500m",  memMin: "32Mi",  memMax: "1000Mi" }
  rust:   { cpuMin: "50m",  cpuMax: "500m",  memMin: "32Mi",  memMax: "200Mi" }
  node:   { cpuMin: "100m", cpuMax: "1000m", memMin: "128Mi", memMax: "4000Mi" }
  python: { cpuMin: "100m", cpuMax: "1000m", memMin: "128Mi", memMax: "4000Mi" }
  jvm:    { cpuMin: "250m", cpuMax: "2000m", memMin: "256Mi", memMax: "1536Mi" }

# Vetted container images. Anything not listed is rejected in app-* and tool-*.
# Cilium and cert-manager run in ungoverned namespaces and are not listed.
imageAllowlist:
  - quay.io/ceph/ceph:v18
  - docker.io/rook/ceph:v1.15.6
  - ghcr.io/cloudnative-pg/postgresql:17.5-minimal-bullseye
  - ghcr.io/cloudnative-pg/cloudnative-pg:1.24.1
  - docker.io/rclone/rclone:1.68.2
  - docker.io/rancher/system-upgrade-controller:v0.14.2
  - docker.io/rancher/kubectl:v1.30.2
  - ghcr.io/hzhou0/opnsense-operator:0.1.0
  - ghcr.io/headlamp-k8s/headlamp:v0.43.0

  # --- applications (app-* tier) ---
  # - ghcr.io/<org>/<app>:<tag>

tiers:
  app:
    psaLevel: restricted
    quota:
      requestsCpu: "4"
      requestsMemory: "8Gi"
      limitsCpu: "4"
      limitsMemory: "8Gi"
      pods: "20"
    # Hard ceiling + floor only; actual values must be declared by the operator and shaped
    # per-runtime by Kyverno (no default request/limit — operator must be explicit).
    limitRange:
      defaults: false
      min: { cpu: "10m",  memory: "16Mi" }
      max: { cpu: "2",    memory: "1536Mi" }
  tool:
    psaLevel: baseline
    quota:
      requestsCpu: "8"
      requestsMemory: "16Gi"
      limitsCpu: "8"
      limitsMemory: "16Gi"
      pods: "40"
    limitRange:
      defaults: true
      defaultRequest: { cpu: "100m", memory: "128Mi" }
      default:        { cpu: "500m", memory: "512Mi" }
      min: { cpu: "10m",  memory: "16Mi" }
      max: { cpu: "4",    memory: "4Gi" }

# Require at most one Helm release per tool-* namespace. Needs Kyverno admission controller to
# read Secrets (an aggregation ClusterRole is created). Set false to drop both.
oneChartPerToolNamespace:
  enabled: true

namespaceMetadata:
  enabled: true
  managedBy: operator-agent

protectedNamespaces:
  - kube-system
  - kube-public
  - kube-node-lease
  - database
  - rook-ceph

networkPolicy:
  enabled: true
  ingressFromNamespaceLabel: "homelab.lab/ingress"
