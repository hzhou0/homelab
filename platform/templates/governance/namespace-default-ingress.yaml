{{- if and .Values.policies.enabled .Values.networkPolicy.enabled }}
{{ $np := .Values.networkPolicy -}}
# Per-namespace ingress ALLOWS, layered on the cilium `east-west-default-deny` CCNP.
#
# The authoritative fence is that CCNP, not this policy: it statically default-denies every governed
# pod, so if this generation ever stops (e.g. the 1.18 generateExisting/synchronize bug) namespaces
# fail CLOSED — they keep the deny and merely lose the allows below until regeneration. This policy
# supplies the allows a clusterwide CCNP can't express per-destination: same-namespace traffic and the
# monitoring scraper (and any namespace labelled homelab.lab/ingress). Stamped into EVERY namespace
# except the same infra exclude-list the CCNP exempts. The generated NetworkPolicy is itself an ingress
# policy (so it also denies-by-default when present) — harmless redundancy with the CCNP, kept because
# namespaceSelector is the clean way to express the label/monitoring allows. The tier governance policy
# (namespace-governance.yaml) owns quota/limits/RoleBinding only.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: namespace-default-ingress
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Namespace ingress allows
    policies.kyverno.io/description: >-
      Stamps a NetworkPolicy allowing same-namespace, monitoring-scrape and ingress-labelled traffic
      into every namespace except the infra exclude-list. Layers on cilium's east-west-default-deny
      CCNP, which is the authoritative fence — namespaces stay default-deny (fail closed) even if this
      policy stops generating.
spec:
  rules:
    - name: default-ingress
      match:
        any:
          - resources:
              kinds:
                - Namespace
      preconditions:
        all:
          # Infra namespaces the CCNP also exempts (kept fully open): CoreDNS (kube-system) receives DNS
          # from every pod; the rest are vendor infra with cross-cutting apiserver/webhook flows or the
          # gateway data path. Must match cilium's eastWestDefaultDeny.excludeNamespaces.
          - key: "{{`{{ request.object.metadata.name }}`}}"
            operator: NotIn
            value:
{{- range $ns := $np.excludeNamespaces }}
              - {{ $ns | quote }}
{{- end }}
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-ingress
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        data:
          metadata:
            labels:
              created-by: kyverno
          spec:
            podSelector: { }
            policyTypes:
              - Ingress
            ingress:
              - from:
                  - podSelector: { }
                  - namespaceSelector:
                      matchLabels:
                        {{ $np.ingressFromNamespaceLabel | quote }}: "true"
{{- if $np.monitoringNamespace }}
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: {{ $np.monitoringNamespace | quote }}
{{- end }}
{{- end }}