{{- if and .Values.policies.enabled .Values.networkPolicy.enabled }}
{{ $np := .Values.networkPolicy -}}
# Per-namespace ingress ALLOWS only. The deny is cilium's east-west-default-deny CCNP, so a
# namespace fails closed if this generation stops. The generated NetworkPolicy is itself an
# ingress policy (harmless redundant deny) — kept because same-namespace/monitoring/label allows
# are cleaner as a per-namespace namespaceSelector than a clusterwide CCNP.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: namespace-default-ingress
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Namespace ingress allows
    policies.kyverno.io/description: >-
      Stamps a NetworkPolicy allowing same-namespace, monitoring-scrape and ingress-labelled
      traffic into every namespace except the infra exclude-list.
spec:
  rules:
    - name: default-ingress
      match:
        any:
          - resources:
              kinds:
                - Namespace
      preconditions:
        all:
          # MUST match cilium's eastWestDefaultDeny.excludeNamespaces — the two lists are one
          # exclude-set split across two charts.
          - key: "{{`{{ request.object.metadata.name }}`}}"
            operator: NotIn
            value:
{{- range $ns := $np.excludeNamespaces }}
              - {{ $ns | quote }}
{{- end }}
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-ingress
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        data:
          metadata:
            labels:
              created-by: kyverno
          spec:
            podSelector: { }
            policyTypes:
              - Ingress
            ingress:
              - from:
                  - podSelector: { }
                  - namespaceSelector:
                      matchLabels:
                        {{ $np.ingressFromNamespaceLabel | quote }}: "true"
{{- if $np.monitoringNamespace }}
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: {{ $np.monitoringNamespace | quote }}
{{- end }}
{{- end }}