{{- if .Values.policies.enabled }}
{{- $a := .Values.tiers.app -}}
{{- $t := .Values.tiers.tool -}}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: namespace-governance
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Namespace governance (app-* / tool-*)
    policies.kyverno.io/description: >-
      Generates the tier-specific resources — ResourceQuota, LimitRange and the operator
      deploy RoleBinding — into every app-*/tool-* namespace, kept in sync so the operator
      cannot widen its own sandbox. Ingress is governed separately by namespace-default-ingress.yaml.
spec:
  rules:
    - name: app-quota
      match:
        any:
          - resources:
              kinds: [Namespace]
              # UPDATE required: namespace patches (PSA labels, operator notes) must not trigger
              # teardown of generated resources.
              operations: [CREATE, UPDATE]
              names: ["{{ .Values.prefixes.app }}*"]
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: ResourceQuota
        name: tier-quota
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        data:
          spec:
            hard:
              requests.cpu: "{{ $a.quota.requestsCpu }}"
              requests.memory: "{{ $a.quota.requestsMemory }}"
              limits.cpu: "{{ $a.quota.limitsCpu }}"
              limits.memory: "{{ $a.quota.limitsMemory }}"
              pods: "{{ $a.quota.pods }}"

    - name: tool-quota
      match:
        any:
          - resources:
              kinds: [Namespace]
              operations: [CREATE, UPDATE]
              names: ["{{ .Values.prefixes.tool }}*"]
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: ResourceQuota
        name: tier-quota
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        data:
          spec:
            hard:
              requests.cpu: "{{ $t.quota.requestsCpu }}"
              requests.memory: "{{ $t.quota.requestsMemory }}"
              limits.cpu: "{{ $t.quota.limitsCpu }}"
              limits.memory: "{{ $t.quota.limitsMemory }}"
              pods: "{{ $t.quota.pods }}"

    - name: app-limits
      match:
        any:
          - resources:
              kinds: [Namespace]
              operations: [CREATE, UPDATE]
              names: ["{{ .Values.prefixes.app }}*"]
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: LimitRange
        name: tier-limits
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        data:
          spec:
            limits:
              - type: Container
                min:
                  cpu: "{{ $a.limitRange.min.cpu }}"
                  memory: "{{ $a.limitRange.min.memory }}"
                max:
                  cpu: "{{ $a.limitRange.max.cpu }}"
                  memory: "{{ $a.limitRange.max.memory }}"

    - name: tool-limits
      match:
        any:
          - resources:
              kinds: [Namespace]
              operations: [CREATE, UPDATE]
              names: ["{{ .Values.prefixes.tool }}*"]
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: LimitRange
        name: tier-limits
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        data:
          spec:
            limits:
              - type: Container
                min:
                  cpu: "{{ $t.limitRange.min.cpu }}"
                  memory: "{{ $t.limitRange.min.memory }}"
                max:
                  cpu: "{{ $t.limitRange.max.cpu }}"
                  memory: "{{ $t.limitRange.max.memory }}"
                default:
                  cpu: "{{ $t.limitRange.default.cpu }}"
                  memory: "{{ $t.limitRange.default.memory }}"
                defaultRequest:
                  cpu: "{{ $t.limitRange.defaultRequest.cpu }}"
                  memory: "{{ $t.limitRange.defaultRequest.memory }}"

{{- if .Values.operator.enabled }}
    - name: operator-rolebinding
      match:
        any:
          - resources:
              kinds: [Namespace]
              operations: [CREATE, UPDATE]
              names: ["{{ .Values.prefixes.app }}*", "{{ .Values.prefixes.tool }}*"]
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        name: "{{ .Values.operator.serviceAccountName }}-deploy"
        namespace: "{{`{{ request.object.metadata.name }}`}}"
        data:
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: "{{ .Values.operator.serviceAccountName }}-deploy"
          subjects:
            - kind: ServiceAccount
              name: "{{ .Values.operator.serviceAccountName }}"
              namespace: "{{ .Values.operator.namespace }}"
{{- end }}
{{- end }}
