{{- if and .Values.policies.enabled .Values.oneChartPerToolNamespace.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: tool-single-release
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: One Helm release per tool-* namespace
    policies.kyverno.io/description: >-
      When Helm records a new release (an owner=helm Secret) in a tool-* namespace,
      reject it if the namespace already holds a different release.
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["secrets"]
  matchConditions:
    - name: in-tool-namespace
      expression: "object.metadata.namespace.startsWith('{{ .Values.prefixes.tool }}')"
    - name: is-helm-release
      expression: "has(object.type) && object.type == 'helm.sh/release.v1'"
  variables:
    - name: thisRelease
      expression: "object.metadata.?labels['name'].orValue('')"
    - name: otherReleases
      expression: >-
        dyn(resource.List("v1", "secrets", object.metadata.namespace, {"owner": "helm"}).items)
          .filter(s, has(s.metadata.labels) && s.metadata.labels['name'] != variables.thisRelease)
          .map(s, s.metadata.labels['name'])
  validations:
    - expression: "variables.otherReleases.size() == 0"
      messageExpression: >-
        "tool-* namespaces allow at most one Helm release; this namespace already hosts: " +
        variables.otherReleases.join(", ") + ". Use a separate tool-* namespace."
{{- end }}
