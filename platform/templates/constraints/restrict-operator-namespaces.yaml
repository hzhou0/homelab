{{- if .Values.operator.enabled }}
# Native ValidatingAdmissionPolicy, not Kyverno: Kyverno excludes its own namespace and
# kube-node-lease from webhook processing, so a Kyverno rule couldn't stop the operator from
# deleting the `kyverno` namespace. A VAP runs inside kube-apiserver with no such exclusions.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ .Values.operator.serviceAccountName }}-namespaces
  labels:
{{ include "platform.labels" . | indent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["namespaces"]
  matchConditions:
    - name: only-operator
      expression: "request.userInfo.username == '{{ include "platform.operatorUsername" . }}'"
  validations:
    # request.name works for CREATE, UPDATE and DELETE (object is null on delete).
    - expression: "(request.name.startsWith('{{ .Values.prefixes.app }}') || request.name.startsWith('{{ .Values.prefixes.tool }}')) && request.name != '{{ .Values.operator.namespace }}'"
      message: "The operator may only create, update or delete app-* / tool-* namespaces (and not its own)."
      reason: Forbidden
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ .Values.operator.serviceAccountName }}-namespaces
  labels:
{{ include "platform.labels" . | indent 4 }}
spec:
  policyName: {{ .Values.operator.serviceAccountName }}-namespaces
  validationActions: [Deny]
{{- end }}
