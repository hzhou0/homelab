{{- if .Values.policies.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: runtime-ranges
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Per-runtime resource ranges (app-*)
    policies.kyverno.io/description: >-
      Each app-* Deployment container's cpu/mem requests and limits must fall
      within the envelope for its declared runtime (runtime-profiles ConfigMap).
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
  matchConditions:
    - name: in-app-namespace
      expression: "object.metadata.namespace.startsWith('{{ .Values.prefixes.app }}')"
  variables:
    - name: profiles
      expression: >-
        resource.Get("v1", "configmaps", "{{ .Release.Namespace }}", "runtime-profiles").data
    - name: runtime
      expression: >-
        has(object.spec.template.metadata.labels) && "{{ .Values.runtimeLabel }}" in object.spec.template.metadata.labels
          ? object.spec.template.metadata.labels["{{ .Values.runtimeLabel }}"] : ""
    - name: cpuMin
      expression: "variables.profiles[?(variables.runtime + '.cpuMin')].orValue('0')"
    - name: cpuMax
      expression: "variables.profiles[?(variables.runtime + '.cpuMax')].orValue('0')"
    - name: memMin
      expression: "variables.profiles[?(variables.runtime + '.memMin')].orValue('0')"
    - name: memMax
      expression: "variables.profiles[?(variables.runtime + '.memMax')].orValue('0')"
  validations:
    # If the runtime is unknown, defer to runtime-label; otherwise every container
    # must declare cpu/mem requests+limits within the runtime envelope.
    - expression: >-
        !((variables.runtime + '.cpuMin') in variables.profiles) ? true :
        object.spec.template.spec.containers.all(c,
          has(c.resources) && has(c.resources.requests) && has(c.resources.limits) &&
          has(c.resources.requests.cpu) && has(c.resources.limits.cpu) &&
          has(c.resources.requests.memory) && has(c.resources.limits.memory) &&
          !quantity(c.resources.requests.cpu).isLessThan(quantity(variables.cpuMin)) &&
          !quantity(c.resources.limits.cpu).isGreaterThan(quantity(variables.cpuMax)) &&
          !quantity(c.resources.requests.memory).isLessThan(quantity(variables.memMin)) &&
          !quantity(c.resources.limits.memory).isGreaterThan(quantity(variables.memMax)))
      messageExpression: >-
        "container cpu/mem requests+limits must be set and within the '" + variables.runtime +
        "' envelope: cpu [" + variables.cpuMin + "," + variables.cpuMax + "], memory [" +
        variables.memMin + "," + variables.memMax + "]."
{{- end }}
