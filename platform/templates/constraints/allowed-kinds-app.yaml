{{- if .Values.policies.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: allowed-kinds-app
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Allowed resource kinds (app-*)
    policies.kyverno.io/description: >-
      app-* namespaces follow the stateless standard deploy pattern. Stateful /
      batch / PVC kinds are rejected here (use a tool-* namespace).
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["statefulsets", "daemonsets", "replicasets"]
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["jobs", "cronjobs"]
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["persistentvolumeclaims", "replicationcontrollers"]
  matchConditions:
    - name: in-app-namespace
      expression: "object.metadata.namespace.startsWith('{{ .Values.prefixes.app }}')"
  validations:
    - expression: "false"
      messageExpression: >-
        "'" + object.kind + "' is not allowed in app-* namespaces (stateless Deployments only); use a tool-* namespace."
{{- end }}
