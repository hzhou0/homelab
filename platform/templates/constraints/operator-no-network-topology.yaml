{{- if and .Values.policies.enabled .Values.operator.enabled }}
{{- $op := include "platform.operatorUsername" . -}}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: operator-no-network-topology
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Operator may not alter network topology
    policies.kyverno.io/description: >-
      Defense-in-depth beyond RBAC: the operator ServiceAccount may not create, update or
      delete ingress/egress gateways or other resources that shape the cluster's network
      topology -- Gateway/GatewayClass, L4 routes, Cilium network CRDs (incl. the egress
      gateway), and native Ingress. App exposure must instead attach an HTTPRoute (still
      allowed) to the single shared internal Gateway. Cluster-admins are unaffected.
spec:
  validationActions: [Deny]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      # HTTPRoute/GRPCRoute are deliberately NOT listed — those are the sanctioned attach path.
      - apiGroups: ["gateway.networking.k8s.io"]
        apiVersions: ["v1", "v1alpha2", "v1beta1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["gateways", "gatewayclasses", "tcproutes"]
      - apiGroups: ["cilium.io"]
        apiVersions: ["v2", "v2alpha1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources:
          - ciliumnetworkpolicies
          - ciliumclusterwidenetworkpolicies
          - ciliuml2announcementpolicies
          - ciliumloadbalancerippools
          - ciliumpodippools
          - ciliumcidrgroups
          - ciliumnodeconfigs
      - apiGroups: ["networking.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["ingresses", "ingressclasses"]
  matchConditions:
    - name: is-operator
      expression: "request.userInfo.username == '{{ $op }}'"
  validations:
    # Static message (not messageExpression): this policy also matches DELETE, where
    # `object` is null and a messageExpression dereferencing it would error.
    - expression: "false"
      message: "The operator may not create ingress/egress gateways or other network-topology resources (Gateway, GatewayClass, L4 routes, Cilium network CRDs, Ingress); expose apps with an HTTPRoute on the shared internal Gateway."
{{- end }}
