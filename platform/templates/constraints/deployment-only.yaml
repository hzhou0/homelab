{{- if .Values.policies.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: no-bare-pods
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: No standalone Pods (app-* / tool-*)
    policies.kyverno.io/description: >-
      Pods must be owned by a controller (Deployment in app-*, any controller/Job
      in tool-*) so workloads are managed and reschedulable.
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  # Evaluate on Pods directly; the autogen'd controller variant mis-rewrites the
  # namespace match, and "bare Pod" only makes sense at the Pod level anyway.
  autogen:
    podControllers:
      controllers: []
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
  matchConditions:
    - name: in-tier-namespace
      expression: >-
        object.metadata.namespace.startsWith('{{ .Values.prefixes.app }}') ||
        object.metadata.namespace.startsWith('{{ .Values.prefixes.tool }}')
  validations:
    - expression: "has(object.metadata.ownerReferences) && object.metadata.ownerReferences.size() > 0"
      message: "Standalone Pods are not allowed; deploy via a Deployment (app-*) or controller/Job (tool-*)."
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: no-pvc-volumes-app
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Stateless Deployments (app-*)
    policies.kyverno.io/description: >-
      app-* Deployments must be stateless: no persistentVolumeClaim volumes.
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
  matchConditions:
    - name: in-app-namespace
      expression: "object.metadata.namespace.startsWith('{{ .Values.prefixes.app }}')"
  validations:
    - expression: >-
        !has(object.spec.template.spec.volumes) ||
        object.spec.template.spec.volumes.all(v, !has(v.persistentVolumeClaim))
      message: "app-* Deployments must be stateless: persistentVolumeClaim volumes are not allowed (use emptyDir, or a tool-* namespace)."
{{- end }}
