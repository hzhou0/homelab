{{- if .Values.policies.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: runtime-label
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Require runtime label (app-*)
    policies.kyverno.io/description: >-
      Every app-* Deployment must declare {{ .Values.runtimeLabel }} on its pod
      template, set to a runtime defined in the runtime-profiles ConfigMap.
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments"]
  matchConditions:
    - name: in-app-namespace
      expression: "object.metadata.namespace.startsWith('{{ .Values.prefixes.app }}')"
  variables:
    - name: profiles
      expression: >-
        resource.Get("v1", "configmaps", "{{ .Release.Namespace }}", "runtime-profiles").data
    - name: runtime
      expression: >-
        has(object.spec.template.metadata.labels) && "{{ .Values.runtimeLabel }}" in object.spec.template.metadata.labels
          ? object.spec.template.metadata.labels["{{ .Values.runtimeLabel }}"] : ""
  validations:
    - expression: >-
        variables.runtime != "" && (variables.runtime + ".cpuMin") in variables.profiles
      message: "app-* Deployments must set pod-template label {{ .Values.runtimeLabel }} to a known runtime (a runtime-profiles key)."
{{- end }}
