{{- if and .Values.policies.enabled .Values.oneChartPerToolNamespace.enabled }}
# Grants Kyverno's admission controller read access to Secrets, aggregated into
# its ClusterRole via the kyverno aggregation label. Needed by the
# tool-single-release policy, whose apiCall lists Helm release Secrets to count
# distinct releases in a namespace. Only created when that feature is enabled.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}:kyverno-secrets-reader
  labels:
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
{{ include "platform.labels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
{{- end }}
