{{- if .Values.operator.enabled }}
# Cluster-scoped + read-only rights, bound cluster-wide. Namespaced write power lives
# exclusively in clusterrole-deploy.yaml, bound per-namespace by namespace-governance —
# that is what actually confines the operator to app-*/tool-* independent of Kyverno exclusions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.operator.serviceAccountName }}
  labels:
{{ include "platform.labels" . | indent 4 }}
rules:
  # Namespace create/update/patch/delete is cluster-wide at the RBAC layer (RBAC can't scope by
  # name prefix); restrict-operator-namespaces gates it to app-*/tool-* names at admission.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Broad cluster-wide read — lets the operator introspect state in any namespace.
  # Secrets are excluded; the operator reads its own projected SA token only.
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - pods/status
      - services
      - endpoints
      - serviceaccounts
      - persistentvolumes
      - persistentvolumeclaims
      - resourcequotas
      - limitranges
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps", "batch", "autoscaling", "policy"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cilium.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io", "acme.cert-manager.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kyverno.io", "policies.kyverno.io", "reports.kyverno.io", "wgpolicyk8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["topolvm.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.cattle.io", "k3s.cattle.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
{{- end }}
