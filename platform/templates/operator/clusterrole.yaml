{{- if .Values.operator.enabled }}
# Cluster-scoped + read-only rights, bound cluster-wide. Namespaced write power lives
# exclusively in clusterrole-deploy.yaml, bound per-namespace by namespace-governance —
# that is what actually confines the operator to app-*/tool-* independent of Kyverno exclusions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.operator.serviceAccountName }}
  labels:
{{ include "platform.labels" . | indent 4 }}
rules:
  # Namespace create/update/patch/delete is cluster-wide at the RBAC layer (RBAC can't scope by
  # name prefix); restrict-operator-namespaces gates it to app-*/tool-* names at admission.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policies.kyverno.io"]
    resources: ["validatingpolicies", "mutatingpolicies", "generatingpolicies", "imagevalidatingpolicies", "deletingpolicies", "policyexceptions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["get", "list", "watch"]
{{- end }}
