# ---------------------------------------------------------------------------
# homelab-metallb values
# ---------------------------------------------------------------------------

# Upstream MetalLB subchart. L2 mode only (the homelab uses L2Advertisement, not
# BGP — see homelab-design-document.md §5/§6), so the FRR/frr-k8s BGP backend is
# disabled to keep the footprint small on the N100 nodes.
metallb:
  enabled: true
  crds:
    enabled: true
  frrk8s:
    enabled: false        # no frr-k8s BGP backend
  speaker:
    enabled: true
    frr:
      enabled: false       # native L2 speaker (ARP), no FRR sidecar
    logLevel: info
  controller:
    enabled: true
    logLevel: info

# Lab LoadBalancer address pool, advertised over L2.
# Source: homelab-design-document.md (MetalLB pool 10.0.0.100–150).
#
# The IPAddressPool/L2Advertisement are custom resources whose CRDs ship with
# MetalLB as templates -- Helm resolves all object types up front, so they cannot
# be created in the SAME pass that first installs the CRDs, and they also need the
# MetalLB webhook running. So install MetalLB first with --set pool.enabled=false,
# then run `helm upgrade --set pool.enabled=true` to apply the pool (set it
# explicitly — Helm carries the pass-1 false value forward otherwise).
pool:
  enabled: true
  name: lab-pool
  addresses:
    - 10.0.0.100-10.0.0.150
  l2AdvertisementName: lab-l2
