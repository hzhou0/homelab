{{- if .Values.pool.enabled }}
# Lab address pool + L2 advertisement. Lands in the release namespace
# (metallb-system). These are validated by MetalLB's webhook, so on a brand-new
# install they may be rejected until the controller/webhook is up — just re-run
# `helm upgrade` once the metallb pods are Ready (the rest of the release applies
# fine on the first pass).
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.pool.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-metallb
spec:
  addresses:
{{ toYaml .Values.pool.addresses | indent 4 }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ .Values.pool.l2AdvertisementName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-metallb
spec:
  ipAddressPools:
    - {{ .Values.pool.name }}
{{- end }}
