# homelab-cilium values

# Upstream Cilium subchart values. `cilium:` is a near-verbatim copy of the live release
# (`helm -n kube-system get values cilium`). Do NOT "tidy" these — they must match the cluster.
cilium:
  enabled: true

  cluster:
    name: default
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList: 10.42.0.0/16
  # The live release recorded 127.0.0.1 (loopback kubeconfig); pinned to the routable IP so
  # agent nodes can reach the API server under kube-proxy replacement.
  k8sServiceHost: 10.0.0.22
  k8sServicePort: 6443
  kubeProxyReplacement: true
  operator:
    replicas: 1
  routingMode: tunnel
  tunnelProtocol: vxlan

  gatewayAPI:
    enabled: true

  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true

  # Scope Cilium's datapath (and host firewall) to ethernet only. Without this, a node that
  # rolls onto wifi (wlan0) would have Cilium manage that interface and the host firewall would
  # lock down wifi ingress too. eth+ covers both nodes' wired NICs (server eth0, spot eth1).
  devices: "eth+"

  # Enables the host firewall so a CiliumClusterwideNetworkPolicy with a `nodeSelector` governs
  # the node's HOST network namespace. Compatible with tunnel/vxlan: the host policy does NOT
  # affect pod-to-pod traffic. IMPORTANT: the host policy's nodeSelector must be non-empty —
  # empty `{}` matches pods too and takes the cluster down (see host-firewall.yaml).
  hostFirewall:
    enabled: true

  l2announcements:
    enabled: true
  # Raise client rate limits per Cilium's L2 guidance to avoid throttling with per-service Leases.
  k8sClientRateLimit:
    qps: 50
    burst: 100

# ---------------------------------------------------------------------------
# East-west baseline allow (pairs with the platform chart's per-namespace default-deny)
# ---------------------------------------------------------------------------
# Additive CCNP that re-allows node/control-plane/gateway ingress (kubelet probes, admission
# webhooks, cilium health, Cilium Gateway) to every pod, so the platform's default-deny does not
# break them. See templates/east-west-baseline-allow.yaml. Land this BEFORE the platform deny.
eastWestBaseline:
  enabled: true

# ---------------------------------------------------------------------------
# Host firewall
# ---------------------------------------------------------------------------
hostFirewall:
  enabled: true
  adminCIDRs:
    - 10.0.0.232/32
    - 10.0.1.140/32

# ---------------------------------------------------------------------------
# LoadBalancer IP management (Cilium LB IPAM + L2)
# ---------------------------------------------------------------------------
loadBalancer:
  enabled: true
  pool:
    name: lab-pool
    start: "10.0.0.101"
    stop: "10.0.0.150"
  # Dedicated single IP for the shared ingress Gateway. The gateway Service has no endpoints
  # (Envoy is fronted by Cilium's BPF), so MetalLB-L2 wouldn't announce it — Cilium does.
  gatewayPool:
    name: gateway-pool
    ip: "10.0.0.100"
  l2:
    name: lab-l2
    # Pin to the LAN node — only k3s-server is on 10.0.0.x; the spot node (10.0.1.x) can't ARP.
    nodeSelector:
      matchLabels:
        kubernetes.io/hostname: k3s-server
    interfaces: []

# ---------------------------------------------------------------------------
# Single shared ingress Gateway: *.internal.haustorium.net
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  name: internal
  namespace: cilium-gateway
  ingressLabel: homelab.lab/ingress
  gatewayClassName: cilium
  hostname: "*.internal.haustorium.net"

  tlsSecretName: internal-haustorium-wildcard-tls
  issuerName: letsencrypt-cloudflare

  expose: false

  # L3 ingress allow-list: only these source IPs may reach the gateway's Envoy front door.
  # An empty list falls back to world + cluster (open). Use /32 for single hosts.
  allowedCIDRs:
    - 10.0.0.232/32
    - 10.0.1.140/32

  hubbleUI:
    enabled: true
    hostname: hubble.internal.haustorium.net
