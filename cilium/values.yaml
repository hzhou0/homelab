# homelab-cilium values

# Upstream Cilium subchart values. `cilium:` is a near-verbatim copy of the live release
# (`helm -n kube-system get values cilium`). Do NOT "tidy" these — they must match the cluster.
cilium:
  enabled: true

  cluster:
    name: default
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList: 10.42.0.0/16
  # The live release recorded 127.0.0.1 (loopback kubeconfig); pinned to the routable IP so
  # agent nodes can reach the API server under kube-proxy replacement.
  k8sServiceHost: 10.0.0.22
  k8sServicePort: 6443
  kubeProxyReplacement: true
  operator:
    replicas: 1
  routingMode: tunnel
  tunnelProtocol: vxlan

  gatewayAPI:
    enabled: true

  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true

  # Scope Cilium's datapath (and host firewall) to ethernet only. Without this, a node that
  # rolls onto wifi (wlan0) would have Cilium manage that interface and the host firewall would
  # lock down wifi ingress too. eth+ covers both nodes' wired NICs (server eth0, spot eth1).
  devices: "eth+"

  # Enables the host firewall so a CiliumClusterwideNetworkPolicy with a `nodeSelector` governs
  # the node's HOST network namespace. Compatible with tunnel/vxlan: the host policy does NOT
  # affect pod-to-pod traffic. IMPORTANT: the host policy's nodeSelector must be non-empty —
  # empty `{}` matches pods too and takes the cluster down (see host-firewall.yaml).
  hostFirewall:
    enabled: true

  l2announcements:
    enabled: true
  # Raise client rate limits per Cilium's L2 guidance to avoid throttling with per-service Leases.
  k8sClientRateLimit:
    qps: 50
    burst: 100

# ---------------------------------------------------------------------------
# East-west default-deny (the authoritative ingress fence)
# ---------------------------------------------------------------------------
# Static CCNP that default-denies east-west ingress for every governed pod and re-allows only the
# node/control-plane/gateway flows a k8s NetworkPolicy can't express. The platform Kyverno policy
# layers same-namespace/monitoring allows on top; because the deny lives HERE (not in that generated
# policy), a namespace fails closed if Kyverno stops generating. See templates/east-west-default-deny.yaml.
eastWestDefaultDeny:
  enabled: true
  # Infra namespaces exempt from the fence (left fully open). MUST match the platform chart's
  # networkPolicy.excludeNamespaces — the two lists are one exclude-set split across two charts.
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - default
    - cilium-gateway
    - cilium-secrets
    - cert-manager
    - kyverno

# ---------------------------------------------------------------------------
# Host firewall
# ---------------------------------------------------------------------------
hostFirewall:
  enabled: true
  adminCIDRs:
    - 10.0.0.232/32
    - 10.0.1.140/32

# ---------------------------------------------------------------------------
# LoadBalancer IP management (Cilium LB IPAM + L2)
# ---------------------------------------------------------------------------
loadBalancer:
  enabled: true
  pool:
    name: lab-pool
    start: "10.0.0.101"
    stop: "10.0.0.150"
  # Dedicated single IP for the shared ingress Gateway. The gateway Service has no endpoints
  # (Envoy is fronted by Cilium's BPF), so MetalLB-L2 wouldn't announce it — Cilium does.
  gatewayPool:
    name: gateway-pool
    ip: "10.0.0.100"
  l2:
    name: lab-l2
    # Pin to the LAN node — only k3s-server is on 10.0.0.x; the spot node (10.0.1.x) can't ARP.
    nodeSelector:
      matchLabels:
        kubernetes.io/hostname: k3s-server
    interfaces: []

# ---------------------------------------------------------------------------
# Single shared ingress Gateway: *.internal.haustorium.net
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  name: internal
  namespace: cilium-gateway
  ingressLabel: homelab.lab/ingress
  gatewayClassName: cilium
  hostname: "*.internal.haustorium.net"

  tlsSecretName: internal-haustorium-wildcard-tls
  issuerName: letsencrypt-cloudflare

  expose: false

  # L3 ingress allow-list: only these source IPs may reach the gateway's Envoy front door.
  # An empty list falls back to world + cluster (open). Use /32 for single hosts.
  allowedCIDRs:
    - 10.0.0.232/32
    - 10.0.1.140/32

  # Namespaces the gateway may reach on the back hop (Envoy `reserved:ingress` -> backend pods).
  # The east-west-default-deny fence no longer grants `ingress` cluster-wide, so a fenced backend is
  # unreachable until its namespace is listed here — add an entry whenever you attach an HTTPRoute
  # whose backend lives in a fenced namespace. Namespaces in eastWestDefaultDeny.excludeNamespaces
  # (e.g. kube-system hubble-ui, kyverno policy-reporter) are already open and need no entry.
  backendNamespaces:
    - app-homepage
    - monitoring
    - seaweedfs
    - tool-headlamp

  hubbleUI:
    enabled: true
    hostname: hubble.internal.haustorium.net
