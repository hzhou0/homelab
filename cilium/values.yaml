# homelab-cilium values

# Upstream Cilium subchart values. `cilium:` is a near-verbatim copy of the live release
# (`helm -n kube-system get values cilium`). Do NOT "tidy" these — they must match the cluster.
cilium:
  enabled: true

  cluster:
    name: default
  ipam:
    operator:
      clusterPoolIPv4PodCIDRList: 10.42.0.0/16
  # The live release recorded 127.0.0.1 (loopback kubeconfig); pinned to the routable IP so
  # agent nodes can reach the API server under kube-proxy replacement.
  k8sServiceHost: 10.0.0.22
  k8sServicePort: 6443
  kubeProxyReplacement: true
  operator:
    replicas: 1
    # Keep cilium-operator (LB IPAM/L2, CRD reconcile) off the reclaimable spot node
    # (node.kubernetes.io/capacity-type=spot). The agent DaemonSet is the CNI and must stay on every
    # node, spot included, so it is deliberately not constrained. Preserves the chart's default
    # host-spread podAntiAffinity.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/capacity-type
                  operator: NotIn
                  values: [spot]
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                io.cilium/app: operator
  routingMode: tunnel
  tunnelProtocol: vxlan

  gatewayAPI:
    enabled: true

  hubble:
    enabled: true
    relay:
      enabled: true
    ui:
      enabled: true

  # Scope Cilium's datapath (and host firewall) to ethernet only. Without this, a node that
  # rolls onto wifi (wlan0) would have Cilium manage that interface and the host firewall would
  # lock down wifi ingress too. eth+ covers both nodes' wired NICs (server eth0, spot eth1).
  devices: "eth+"

  # Host firewall. Compatible with tunnel/vxlan (host policy does NOT affect pod-to-pod traffic).
  # The host policy's nodeSelector must be non-empty — empty `{}` matches pods too and takes the
  # cluster down (see host-firewall.yaml).
  hostFirewall:
    enabled: true

  l2announcements:
    enabled: true
  # Raise client rate limits per Cilium's L2 guidance to avoid throttling with per-service Leases.
  k8sClientRateLimit:
    qps: 50
    burst: 100

# East-west default-deny (the authoritative ingress fence). See templates/east-west-default-deny.yaml.
eastWestDefaultDeny:
  enabled: true
  # MUST match the platform chart's networkPolicy.excludeNamespaces — one exclude-set split across
  # two charts.
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - default
    - cilium-gateway
    - cilium-secrets
    - cert-manager
    - kyverno

# ---------------------------------------------------------------------------
# Host firewall
# ---------------------------------------------------------------------------
hostFirewall:
  enabled: true
  adminCIDRs:
    - 10.0.0.232/32
    - 10.0.1.140/32

# ---------------------------------------------------------------------------
# LoadBalancer IP management (Cilium LB IPAM + L2)
# ---------------------------------------------------------------------------
loadBalancer:
  enabled: true
  pool:
    name: lab-pool
    start: "10.0.0.101"
    stop: "10.0.0.150"
  # Dedicated single IP for the shared ingress Gateway. The gateway Service has no endpoints
  # (Envoy is fronted by Cilium's BPF), so it needs its own pool rather than sharing lab-pool.
  gatewayPool:
    name: gateway-pool
    ip: "10.0.0.100"
  l2:
    name: lab-l2
    # Pin the announcer to the control-plane node: it must already be up for the cluster to function,
    # so hosting the LB IPs there means ephemeral worker failover never disturbs LB reachability.
    nodeSelector:
      matchLabels:
        kubernetes.io/hostname: k3s-server
    interfaces: []

# ---------------------------------------------------------------------------
# Single shared ingress Gateway: *.internal.haustorium.net
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  name: internal
  namespace: cilium-gateway
  ingressLabel: homelab.lab/ingress
  gatewayClassName: cilium
  hostname: "*.internal.haustorium.net"

  tlsSecretName: internal-haustorium-wildcard-tls
  issuerName: letsencrypt-cloudflare

  expose: false

  # L3 ingress allow-list: only these source IPs may reach the gateway's Envoy front door.
  # An empty list falls back to world + cluster (open). Use /32 for single hosts.
  allowedCIDRs:
    - 10.0.0.232/32
    - 10.0.1.140/32

  # Backends the gateway may reach on the reverse hop. A fenced namespace is unreachable from the
  # gateway until listed here; namespaces in eastWestDefaultDeny.excludeNamespaces are already open.
  backendNamespaces:
    - app-homepage
    - monitoring
    - seaweedfs
    - tool-headlamp

  hubbleUI:
    enabled: true
    hostname: hubble.internal.haustorium.net

# ---------------------------------------------------------------------------
# WireGuard remote-access tunnel
# ---------------------------------------------------------------------------
# A cluster-hosted WireGuard server so admins can tunnel in from off-LAN. Decrypted client
# traffic is masqueraded to the pod IP, so Cilium sees the whole tunnel as this one endpoint;
# an egress fence (templates/wireguard.yaml) then confines that endpoint to the ingress Gateway
# and the LAN DNS only. See README "WireGuard remote-access tunnel".
wireguard:
  enabled: true
  namespace: wireguard
  image: lscr.io/linuxserver/wireguard:1.0.20260223
  # One-shot privileged init that enables net.ipv4.ip_forward in the pod netns (see wireguard.yaml).
  sysctlInitImage: busybox:1.37
  # UDP listen port; also the WAN port OPNsense must DNAT to loadBalancerIP.
  listenPort: 51820
  # Pinned from lab-pool so the OPNsense WAN forward has a stable target. Keep out of any other
  # Service's use.
  loadBalancerIP: "10.0.0.101"
  # Must be the loadBalancer.l2 announcer host: that node alone answers loadBalancerIP, and the
  # Service uses externalTrafficPolicy:Local (no off-node forward, real peer IP preserved).
  nodeName: k3s-server
  # Let opnsense-operator create the WAN UDP DNAT (homelab.lab/expose). Needs opnsense-operator
  # installed. Off => wire the WAN:listenPort/udp forward by hand.
  expose: true
  # Peer subnet; the server interface takes .1.
  serverAddress: "10.9.0.1/24"
  # LAN resolver (OPNsense Unbound) the tunnel may reach — it answers *.internal.haustorium.net.
  lanDNS: "10.0.0.1"

  # Server private key, injected at runtime from a Secret you precreate (never in Helm values or
  # release state). The chart owns the `wireguard` namespace — do NOT `kubectl create` it yourself
  # (Helm can't adopt an untagged namespace). Create the Secret AFTER the first `helm upgrade`; the
  # pod stays in ContainerCreating until it exists, then starts:
  #   wg genkey | kubectl -n wireguard create secret generic wireguard-privatekey \
  #     --from-file=privatekey=/dev/stdin
  privateKeySecret:
    name: wireguard-privatekey
    key: privatekey

  # Tunnel peers. publicKey/address are not secret. address is the peer's /32 in serverAddress's subnet.
  peers:
    - name: laptop
      publicKey: "IfvIa2dLZYVQ+DP/WMYW5Xg2BiVvhvdKLSR1WKk2Y1c="
      address: "10.9.0.2/32"
