{{- if .Values.loadBalancer.enabled }}
{{- $lb := .Values.loadBalancer }}
# Cilium LB IPAM + L2 announcement — the homelab's LoadBalancer stack (replaces MetalLB).
#
# Two pools so the shared gateway keeps a stable, predictable IP while everything else (UDP
# services etc.) draws from the general range:
#   - lab-pool      : every LoadBalancer Service EXCEPT the gateway (owning-gateway label absent)
#   - gateway-pool  : exactly the gateway Service (matched by its owning-gateway label) -> 1 IP
# A single CiliumL2AnnouncementPolicy then ARP-announces all assigned LB IPs from the LAN node.
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ $lb.pool.name }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  blocks:
    - start: {{ $lb.pool.start | quote }}
      stop: {{ $lb.pool.stop | quote }}
  # Exclude the gateway Service so it can only draw from gateway-pool below.
  serviceSelector:
    matchExpressions:
      - key: io.cilium.gateway/owning-gateway
        operator: DoesNotExist
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ $lb.gatewayPool.name }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  # Single-IP range (start==stop) rather than a /32 cidr, so allowFirstLastIPs can't drop it.
  blocks:
    - start: {{ $lb.gatewayPool.ip | quote }}
      stop: {{ $lb.gatewayPool.ip | quote }}
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: {{ .Values.gateway.name | quote }}
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: {{ $lb.l2.name }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  # Announce LoadBalancer IPs (not arbitrary externalIPs) for all matching Services.
  loadBalancerIPs: true
  {{- with $lb.l2.interfaces }}
  interfaces:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  # Pin announcements to the node(s) on the LB segment's L2 domain.
  nodeSelector:
    {{- toYaml $lb.l2.nodeSelector | nindent 4 }}
{{- end }}
