{{- if .Values.loadBalancer.enabled }}
{{- $lb := .Values.loadBalancer }}
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ $lb.pool.name }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  blocks:
    - start: {{ $lb.pool.start | quote }}
      stop: {{ $lb.pool.stop | quote }}
  serviceSelector:
    matchExpressions:
      - key: io.cilium.gateway/owning-gateway
        operator: DoesNotExist
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ $lb.gatewayPool.name }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  # start==stop single-IP range instead of a /32 cidr (allowFirstLastIPs can't drop it).
  blocks:
    - start: {{ $lb.gatewayPool.ip | quote }}
      stop: {{ $lb.gatewayPool.ip | quote }}
  serviceSelector:
    matchLabels:
      io.cilium.gateway/owning-gateway: {{ .Values.gateway.name | quote }}
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: {{ $lb.l2.name }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  loadBalancerIPs: true
  {{- with $lb.l2.interfaces }}
  interfaces:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  nodeSelector:
    {{- toYaml $lb.l2.nodeSelector | nindent 4 }}
{{- end }}
