{{- if .Values.gateway.enabled }}
{{- $g := .Values.gateway }}
# homelab.lab/ingress=true lets the platform's default-ingress NetworkPolicy admit gateway traffic.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $g.namespace }}
  labels:
    {{ $g.ingressLabel | default "homelab.lab/ingress" }}: "true"
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
---
# Until the ACME order completes the Gateway stays un-programmed for HTTPS — expected on first install.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $g.name }}-tls
  namespace: {{ $g.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  secretName: {{ $g.tlsSecretName }}
  dnsNames:
    - {{ $g.hostname | quote }}
  issuerRef:
    name: {{ $g.issuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $g.name }}
  namespace: {{ $g.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
  annotations:
    homelab.lab/hostname: {{ $g.hostname | quote }}
    {{- if $g.expose }}
    homelab.lab/expose: "true"
    {{- end }}
spec:
  gatewayClassName: {{ $g.gatewayClassName | default "cilium" }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ $g.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $g.tlsSecretName }}
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ $g.hostname | quote }}
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
