{{- if .Values.gateway.enabled }}
{{- $g := .Values.gateway }}
# Dedicated namespace for the shared ingress Gateway. The homelab.lab/ingress label
# lets the platform's per-namespace default-ingress NetworkPolicy admit traffic from
# here into app-*/tool-* backends (see homelab-platform values.networkPolicy).
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $g.namespace }}
  labels:
    {{ $g.ingressLabel | default "homelab.lab/ingress" }}: "true"
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
---
# Wildcard TLS cert for the gateway, issued by cert-manager (DNS-01 via Cloudflare).
# Produces the Secret the HTTPS listener references. Until the ACME order completes the
# Gateway stays un-programmed for HTTPS — expected on first install.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $g.name }}-tls
  namespace: {{ $g.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  secretName: {{ $g.tlsSecretName }}
  dnsNames:
    - {{ $g.hostname | quote }}
  issuerRef:
    name: {{ $g.issuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
---
# The one ingress Gateway. gatewayClassName=cilium -> Cilium provisions a backing
# LoadBalancer Service `cilium-gateway-<name>`, assigns it the dedicated gatewayPool IP
# (Cilium LB IPAM) and L2-announces it. The homelab.lab/hostname annotation drives the
# opnsense-operator to create the wildcard Unbound DNS override pointing at that IP.
# allowedRoutes.from=All lets HTTPRoutes in any app-*/tool-* namespace attach without a
# ReferenceGrant.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $g.name }}
  namespace: {{ $g.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
  annotations:
    homelab.lab/hostname: {{ $g.hostname | quote }}
    {{- if $g.expose }}
    homelab.lab/expose: "true"
    {{- end }}
spec:
  gatewayClassName: {{ $g.gatewayClassName | default "cilium" }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ $g.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $g.tlsSecretName }}
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      hostname: {{ $g.hostname | quote }}
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
