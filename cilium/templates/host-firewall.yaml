{{- if .Values.hostFirewall.enabled }}
# Host firewall: default-deny host ingress, allowing in-cluster identities + admin hosts + all UDP.
# Net effect: TCP/SCTP from `world` is dropped; DHCP/DNS/NTP/vxlan (UDP) and all in-cluster
# traffic are unaffected. Egress is open (conntrack allows established-reply traffic in regardless).
#
# nodeSelector must be non-empty: {} also matches pods and would flip the whole cluster to
# default-deny ingress (breaks pod→coredns DNS). kubernetes.io/os=linux is on every node, no pod.
#
# Cilium's default-deny is per-direction, not per-protocol, so selecting the host with any ingress
# rule default-denies ALL protocols. Re-allowing all UDP from world restores DHCP/DNS/NTP/vxlan.
#
# Enforces only on Cilium's managed devices; cilium.devices: "eth+" keeps wlan0 out of scope.
#
# Roll out in audit mode first: cilium endpoint config <host-ep-id> PolicyAuditMode=Enabled
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: host-firewall-cluster-only
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  description: >-
    Host firewall: default-deny host ingress, re-allowing all traffic from in-cluster
    identities and the admin hosts plus all UDP from anywhere. Net effect: TCP/SCTP into
    the nodes is cluster-only; UDP (DHCP/DNS/NTP/vxlan) is unaffected.
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  enableDefaultDeny:
    ingress: true
    egress: false
  ingress:
    - fromEntities:
        - cluster
        - remote-node
        - health
        - kube-apiserver
        - ingress
    {{- with .Values.hostFirewall.adminCIDRs }}
    - fromCIDR:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
    # Re-allow all UDP so the per-direction default-deny doesn't break node networking.
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "1"
              endPort: 65535
              protocol: UDP
{{- end }}
