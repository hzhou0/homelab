{{- if .Values.eastWestBaseline.enabled }}
# East-west baseline allow (additive — opens nothing on its own).
#
# The platform chart default-denies ingress per namespace (a plain k8s NetworkPolicy). But a plain
# NetworkPolicy can only match CIDR/namespace/pod selectors — it CANNOT express the node- and
# control-plane-sourced flows that every pod still needs once it's default-denied. Hubble on this
# cluster confirmed those flows are real and non-obvious:
#   - kubelet health/liveness probes            -> source identity `host` (and `remote-node`)
#   - apiserver-invoked admission webhooks       -> `remote-node` / `kube-apiserver`
#     (kyverno:9443, cert-manager:9403, prometheus-operator, ... arrive cross-node as remote-node)
#   - cilium health checks                       -> `health`
#   - Cilium Gateway -> backend pods             -> `ingress` (NOT the gateway namespace: Envoy
#     re-identifies proxied traffic as reserved:ingress, so a namespaceSelector can't match it)
#
# This CCNP grants exactly those identities to every pod, and NOTHING else. Critically it does NOT
# allow `cluster` — that would re-permit all pod-to-pod traffic and defeat the default-deny. It is
# purely additive: enableDefaultDeny:false means it never itself flips a pod to default-deny (that
# stays the platform NetworkPolicy's job, so it can be scoped/excluded per namespace). Infra
# namespaces the platform excludes (kube-system/CoreDNS, cert-manager, kyverno) are untouched here.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: east-west-baseline-allow
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  description: >-
    Additive baseline: re-allows kubelet probes, apiserver admission webhooks, cilium health and
    Cilium Gateway traffic (host/remote-node/health/kube-apiserver/ingress) to every pod, so the
    platform's per-namespace default-deny does not break them. Opens no pod-to-pod traffic.
  # All pod endpoints (they carry a namespace label); the Exists guard skips label-less reserved
  # identities. enableDefaultDeny:false keeps this an allow-only union, never a deny trigger.
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: Exists
  enableDefaultDeny:
    ingress: false
    egress: false
  ingress:
    - fromEntities:
        - host
        - remote-node
        - health
        - kube-apiserver
        - ingress
{{- end }}
