{{- if .Values.gateway.enabled }}
# Clients → `ingress` proxy L3 allow-list. A vanilla k8s NetworkPolicy cannot match the reserved
# `ingress` identity, so this front-door allow is Cilium-native.
#
# The reverse hop (ingress proxy → backend pods) needs no policy here: the east-west-baseline-allow
# CCNP already grants `fromEntities: [ingress]` to every pod, so any Gateway backend is reachable by
# the proxy regardless of namespace. (It used to be a second CCNP scoped by backendsExcludeNamespaces;
# that became redundant once the baseline allow + the platform's namespace-default-ingress landed.)
{{- if .Values.gateway.allowedCIDRs }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-clients-to-gateway-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchLabels:
      reserved:ingress: ""
  ingress:
    - fromCIDR:
        {{- range .Values.gateway.allowedCIDRs }}
        - {{ . | quote }}
        {{- end }}
{{- else }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-clients-to-gateway-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchLabels:
      reserved:ingress: ""
  ingress:
    - fromEntities:
        - world
        - cluster
{{- end }}
{{- end }}
