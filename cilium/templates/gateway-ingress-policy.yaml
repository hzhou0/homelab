{{- if .Values.gateway.enabled }}
# Clients → `ingress` proxy L3 allow-list. A vanilla k8s NetworkPolicy cannot match the reserved
# `ingress` identity, so this front-door allow is Cilium-native.
#
# The reverse hop (ingress proxy → backend pods) is the second CCNP below. The fence deliberately
# does NOT grant `ingress` cluster-wide, so the proxy can only reach fenced backends whose namespace
# is in gateway.backendNamespaces — a route into a fenced namespace is dead until that namespace is
# listed. Envoy re-identifies proxied traffic as reserved:ingress, which a namespaceSelector can't
# match either, so the reverse hop is Cilium-native too.
{{- if .Values.gateway.allowedCIDRs }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-clients-to-gateway-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchLabels:
      reserved:ingress: ""
  ingress:
    - fromCIDR:
        {{- range .Values.gateway.allowedCIDRs }}
        - {{ . | quote }}
        {{- end }}
{{- else }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-clients-to-gateway-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchLabels:
      reserved:ingress: ""
  ingress:
    - fromEntities:
        - world
        - cluster
{{- end }}
{{- if .Values.gateway.backendNamespaces }}
---
# Reverse hop: Envoy `reserved:ingress` → backend pods, scoped to the namespaces that host routes.
# Additive (enableDefaultDeny:false) — the east-west-default-deny fence owns the deny; this only
# re-opens `ingress` for the listed backends, so the gateway's reach is an explicit allow-list.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-gateway-ingress-to-backends
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values:
{{- range $ns := .Values.gateway.backendNamespaces }}
          - {{ $ns | quote }}
{{- end }}
  enableDefaultDeny:
    ingress: false
  ingress:
    - fromEntities:
        - ingress
{{- end }}
{{- end }}
