{{- if and .Values.gateway.enabled .Values.gateway.allowBackendsFromIngress }}
# Cilium enforces Gateway API traffic at two policy boundaries: clientsâ†’`ingress` proxy, and
# `ingress` proxyâ†’backends. A vanilla k8s NetworkPolicy cannot match the reserved `ingress`
# identity, so both hops need Cilium-native allows. These union with (never replace) the
# platform's per-namespace default-deny.

# Boundary 1: clients â†’ ingress proxy.
{{- if .Values.gateway.allowedCIDRs }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-clients-to-gateway-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchLabels:
      reserved:ingress: ""
  ingress:
    - fromCIDR:
        {{- range .Values.gateway.allowedCIDRs }}
        - {{ . | quote }}
        {{- end }}
{{- else }}
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-clients-to-gateway-ingress
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchLabels:
      reserved:ingress: ""
  ingress:
    - fromEntities:
        - world
        - cluster
{{- end }}
---
# Boundary 2: ingress proxy â†’ backends.
#
# Selecting a pod with an ingress rule flips it to default-deny ingress â€” safe only for
# app-*/tool-* which the platform already default-denies. endpointSelector must exclude system
# namespaces (no default-deny of their own), otherwise coredns and other system pods get swept
# in and break. Cilium can't prefix-match app-*/tool-*, so we blocklist non-governed namespaces.
#
# Exists requirement is critical: a bare NotIn MATCHES label-less endpoints (reserved:health),
# which broke cross-node cilium-health. Requiring namespace label Exists excludes them.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-gateway-ingress-to-backends
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: Exists
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          {{- range .Values.gateway.backendsExcludeNamespaces }}
          - {{ . | quote }}
          {{- end }}
  ingress:
    - fromEntities:
        - ingress
{{- end }}
