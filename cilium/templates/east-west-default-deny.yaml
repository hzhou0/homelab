{{- if .Values.eastWestDefaultDeny.enabled }}
# The authoritative east-west deny. Static (no controller), so it cannot silently disappear —
# the platform's per-namespace NetworkPolicy only LAYERS allows on top, so a governed namespace
# fails CLOSED if Kyverno stops generating.
#
# The allows here are the node/control-plane flows a plain k8s NetworkPolicy cannot express
# (Hubble confirmed each is real):
#   - kubelet health/liveness probes            -> host, remote-node
#   - apiserver-invoked admission webhooks       -> remote-node, kube-apiserver
#     (kyverno:9443, cert-manager:9403, ... arrive cross-node as remote-node)
#   - cilium health checks                       -> health
# The Cilium Gateway (reserved:ingress) is deliberately NOT granted here — scoped per backend
# namespace by gateway-ingress-policy.yaml, so a fenced pod is unreachable from the gateway
# unless its namespace hosts a route. `cluster` is absent (would re-permit all pod-to-pod).
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: east-west-default-deny
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  description: >-
    Cluster-wide default-deny ingress for all governed pods, re-allowing only the kubelet-probe,
    apiserver-webhook and cilium-health flows (host/remote-node/health/kube-apiserver).
  # This list MUST mirror the platform chart's networkPolicy.excludeNamespaces.
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: Exists
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
{{- range $ns := .Values.eastWestDefaultDeny.excludeNamespaces }}
          - {{ $ns | quote }}
{{- end }}
  enableDefaultDeny:
    ingress: true
    egress: false
  ingress:
    - fromEntities:
        - host
        - remote-node
        - health
        - kube-apiserver
{{- end }}
