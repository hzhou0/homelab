{{- if and .Values.gateway.enabled .Values.gateway.hubbleUI.enabled .Values.cilium.hubble.ui.enabled }}
# Expose the Hubble UI through the shared ingress Gateway.
#
# The HTTPRoute lives in kube-system (same namespace as the hubble-ui Service, so no
# ReferenceGrant is needed for the backendRef) and attaches to the `internal` Gateway in
# the cilium-gateway namespace -- the Gateway's allowedRoutes.from: All permits the cross-
# namespace parentRef. Reachability is still bounded by the gateway's L3 allow-list
# (gateway.allowedCIDRs), so only the admin hosts can load the dashboard, and TLS is
# terminated by the Gateway's wildcard cert.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: kube-system
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: homelab-cilium
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.gateway.hubbleUI.hostname | quote }}
  rules:
    - backendRefs:
        - name: hubble-ui
          port: 80
{{- end }}
