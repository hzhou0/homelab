name: opnsense-operator image

# Builds the opnsense-operator container image and pushes it to GHCR.
# Scoped to the operator's subtree in this monorepo.
on:
  push:
    branches: [main]
    paths:
      - "opnsense-operator/**"
      - ".github/workflows/opnsense-operator.yml"
    tags:
      - "opnsense-operator/v*"
  pull_request:
    paths:
      - "opnsense-operator/**"
      - ".github/workflows/opnsense-operator.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/opnsense-operator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Don't push on pull_request events (no creds for forks, and we only want
      # images from main / tags).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=match,pattern=opnsense-operator/v(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: opnsense-operator
          file: opnsense-operator/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=opnsense-operator
          cache-to: type=gha,mode=max,scope=opnsense-operator
