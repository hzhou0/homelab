# Run:  pre-commit install   (once per clone, to wire up the git hook)
# Manual: pre-commit run --all-files
#
# The sync-references hook copies each top-level Helm chart's README.md into
# agents/operator/references/ (a sandboxed operator agent that only mounts
# agents/operator/ can't follow symlinks out of it). Following the formatter
# convention, it exits non-zero if it changed anything, so the commit is blocked
# until the refreshed copies are staged.
repos:
  - repo: local
    hooks:
      - id: sync-references
        name: sync chart READMEs into agents/operator/references
        language: system
        pass_filenames: false
        always_run: true
        entry: |
          bash -c '
          set -euo pipefail
          cd "$(git rev-parse --show-toplevel)"
          dest=agents/operator/references
          mkdir -p "$dest"
          changed=0
          for readme in */README.md; do
            name="${readme%/README.md}"
            [ "$name" = agents ] && continue
            { [ -f "$name/Chart.yaml" ] || [ -f "$name/chart/Chart.yaml" ]; } || continue
            out="$dest/$name.md"
            { printf "<!-- Generated by .pre-commit-config.yaml from %s. Do not edit. -->\n\n" "$readme"; cat "$readme"; } > "$out.tmp"
            if cmp -s "$out.tmp" "$out" 2>/dev/null; then
              rm -f "$out.tmp"
            else
              mv "$out.tmp" "$out"; echo "updated $out"; changed=1
            fi
          done
          [ "$changed" -eq 0 ] || { echo "references updated - stage them: git add $dest" >&2; exit 1; }
          '
