{{- if .Values.policies.enabled }}
# Allowed container images as a comma-separated string so the CEL image-allowlist
# policy can read it via resource.Get(...).data["images"].split(","). To run a new
# image, add it to imageAllowlist in values and upgrade.
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-allowlist
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "platform.labels" . | indent 4 }}
data:
  images: {{ join "," .Values.imageAllowlist | quote }}
{{- end }}
