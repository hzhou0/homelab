{{- if .Values.policies.enabled }}
# Per-runtime cpu/mem envelopes, flattened to "<runtime>.<bound>" keys so the
# CEL runtime-label / runtime-ranges policies can read them directly via
# resource.Get(...).data["go.cpuMin"] without JSON parsing. A runtime is "known"
# iff its "<runtime>.cpuMin" key exists.
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-profiles
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "platform.labels" . | indent 4 }}
data:
{{- range $runtime, $p := .Values.runtimeProfiles }}
  {{ $runtime }}.cpuMin: {{ $p.cpuMin | quote }}
  {{ $runtime }}.cpuMax: {{ $p.cpuMax | quote }}
  {{ $runtime }}.memMin: {{ $p.memMin | quote }}
  {{ $runtime }}.memMax: {{ $p.memMax | quote }}
{{- end }}
{{- end }}
