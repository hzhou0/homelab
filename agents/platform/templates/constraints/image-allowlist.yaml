{{- if .Values.policies.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: image-allowlist
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Container image allowlist (app-* / tool-*)
    policies.kyverno.io/description: >-
      Only images listed in the image-allowlist ConfigMap may run in app-*/tool-*.
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  # Evaluate on Pods directly (covers every controller's pods); the autogen'd
  # controller variant mis-rewrites the namespace match.
  autogen:
    podControllers:
      controllers: []
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: in-tier-namespace
      expression: >-
        object.metadata.namespace.startsWith('{{ .Values.prefixes.app }}') ||
        object.metadata.namespace.startsWith('{{ .Values.prefixes.tool }}')
  variables:
    - name: allowed
      expression: >-
        resource.Get("v1", "configmaps", "{{ .Release.Namespace }}", "image-allowlist").data["images"].split(",")
    - name: containers
      expression: "object.spec.containers + object.spec.?initContainers.orValue([])"
  validations:
    - expression: "variables.containers.all(c, c.image in variables.allowed)"
      messageExpression: >-
        "container image not in the allowlist; add it to the image-allowlist ConfigMap. Images: " + variables.containers.map(c, c.image).join(", ")
{{- end }}
