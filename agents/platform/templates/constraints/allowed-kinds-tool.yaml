{{- if .Values.policies.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: allowed-kinds-tool
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Allowed resource kinds (tool-*)
    policies.kyverno.io/description: >-
      tool-* namespaces allow the app set plus StatefulSet, DaemonSet, Job,
      CronJob and PVC. Raw ReplicaSets / ReplicationControllers stay disallowed.
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["replicasets"]
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["replicationcontrollers"]
  matchConditions:
    - name: in-tool-namespace
      expression: "object.metadata.namespace.startsWith('{{ .Values.prefixes.tool }}')"
  validations:
    - expression: "false"
      messageExpression: >-
        "'" + object.kind + "' is not allowed in tool-* namespaces; deploy a controller (Deployment/StatefulSet/DaemonSet) or Job instead."
{{- end }}
