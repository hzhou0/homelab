{{- if and .Values.policies.enabled .Values.operator.enabled }}
{{- $op := include "platform.operatorUsername" . -}}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: protect-constraints
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Protect the constraint surface from the operator
    policies.kyverno.io/description: >-
      Defense-in-depth beyond RBAC: the operator ServiceAccount may not create,
      update or delete Kyverno/admission policies, RBAC, or the generated namespace
      guardrails. Cluster-admins and Kyverno's own controllers are unaffected.
spec:
  validationActions: [Deny]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: ["policies.kyverno.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["validatingpolicies", "mutatingpolicies", "generatingpolicies", "imagevalidatingpolicies", "deletingpolicies", "policyexceptions"]
      - apiGroups: ["kyverno.io"]
        apiVersions: ["v1", "v2"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["clusterpolicies", "policies", "policyexceptions"]
      - apiGroups: ["admissionregistration.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
      - apiGroups: ["rbac.authorization.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["clusterroles", "roles", "clusterrolebindings", "rolebindings"]
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["resourcequotas", "limitranges"]
      - apiGroups: ["networking.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["networkpolicies"]
  matchConditions:
    - name: is-operator
      expression: "request.userInfo.username == '{{ $op }}'"
  validations:
    - expression: "false"
      message: "The operator may not modify the constraint surface (policies, RBAC, or namespace guardrails)."
---
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: protect-platform-configmaps
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Protect platform ConfigMaps from the operator
    policies.kyverno.io/description: >-
      The operator may not modify the runtime-profiles / image-allowlist ConfigMaps;
      change them via a chart upgrade.
spec:
  validationActions: [Deny]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["configmaps"]
  matchConditions:
    - name: is-operator
      expression: "request.userInfo.username == '{{ $op }}'"
    - name: is-platform-configmap
      expression: >-
        request.namespace == '{{ .Release.Namespace }}' &&
        (request.name == 'runtime-profiles' || request.name == 'image-allowlist')
  validations:
    - expression: "false"
      message: "The operator may not modify the runtime-profiles / image-allowlist ConfigMaps."
{{- end }}
