{{- if .Values.policies.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: runtime-ranges
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Per-runtime resource ranges (app-*)
    policies.kyverno.io/description: >-
      Looks up the cpu/mem envelope for the Deployment's declared runtime (from
      the runtime-profiles ConfigMap) and rejects any container whose requests or
      limits fall outside that window. Presence of requests+limits is forced by
      the namespace ResourceQuota.
spec:
  background: false
  rules:
    - name: container-resources-within-runtime-envelope
      match:
        any:
          - resources:
              kinds: [Deployment]
              namespaces: ["{{ include "platform.appGlob" . }}"]
      context:
        - name: profiles
          configMap:
            name: runtime-profiles
            namespace: {{ .Release.Namespace }}
        - name: runtime
          variable:
            jmesPath: {{ printf "request.object.spec.template.metadata.labels.\"%s\"" .Values.runtimeLabel | quote }}
        - name: profile
          variable:
            jmesPath: {{ printf "profiles.data.\"{{ runtime }}\" | parse_json(@)" | quote }}
      validate:
        failureAction: {{ .Values.policies.failureAction }}
        message: >-
          A container's cpu/mem requests or limits are outside the allowed range
          for runtime '{{ "{{ runtime }}" }}'. Allowed: cpu [{{ "{{ profile.cpuMin }}" }},{{ "{{ profile.cpuMax }}" }}],
          memory [{{ "{{ profile.memMin }}" }},{{ "{{ profile.memMax }}" }}].
        foreach:
          - list: "request.object.spec.template.spec.containers"
            deny:
              conditions:
                any:
                  - key: {{ "{{ element.resources.requests.cpu || '0' }}" | quote }}
                    operator: LessThan
                    value: {{ "{{ profile.cpuMin }}" | quote }}
                  - key: {{ "{{ element.resources.limits.cpu || '0' }}" | quote }}
                    operator: GreaterThan
                    value: {{ "{{ profile.cpuMax }}" | quote }}
                  - key: {{ "{{ element.resources.requests.memory || '0' }}" | quote }}
                    operator: LessThan
                    value: {{ "{{ profile.memMin }}" | quote }}
                  - key: {{ "{{ element.resources.limits.memory || '0' }}" | quote }}
                    operator: GreaterThan
                    value: {{ "{{ profile.memMax }}" | quote }}
{{- end }}
