{{- if and .Values.policies.enabled .Values.namespaceMetadata.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: namespace-metadata
  labels:
{{ include "platform.labels" . | indent 4 }}
  annotations:
    policies.kyverno.io/title: Required namespace metadata (app-* / tool-*)
    policies.kyverno.io/description: >-
      Operator-managed app-*/tool-* namespaces must carry provenance annotations
      (homelab.lab/src, homelab.lab/notes) and the recommended app.kubernetes.io/*
      labels, with managed-by pinned to '{{ .Values.namespaceMetadata.managedBy }}'.
spec:
  validationActions: [{{ .Values.policies.validationAction | default "Deny" }}]
  evaluation:
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  matchConditions:
    - name: tier-namespace-not-platform
      expression: >-
        (object.metadata.name.startsWith('{{ .Values.prefixes.app }}') ||
         object.metadata.name.startsWith('{{ .Values.prefixes.tool }}')) &&
        object.metadata.name != '{{ .Values.operator.namespace }}'
  variables:
    - name: ann
      expression: "object.metadata.?annotations.orValue({})"
    - name: lbl
      expression: "object.metadata.?labels.orValue({})"
  validations:
    - expression: >-
        'homelab.lab/src' in variables.ann && variables.ann['homelab.lab/src'] != '' &&
        'homelab.lab/notes' in variables.ann && variables.ann['homelab.lab/notes'] != ''
      message: "app-*/tool-* namespaces must set annotations 'homelab.lab/src' (source URL or vendor) and 'homelab.lab/notes' (description)."
    - expression: >-
        'app.kubernetes.io/name' in variables.lbl && variables.lbl['app.kubernetes.io/name'] != '' &&
        'app.kubernetes.io/instance' in variables.lbl && variables.lbl['app.kubernetes.io/instance'] != '' &&
        'app.kubernetes.io/version' in variables.lbl && variables.lbl['app.kubernetes.io/version'] != '' &&
        'app.kubernetes.io/component' in variables.lbl && variables.lbl['app.kubernetes.io/component'] != '' &&
        'app.kubernetes.io/part-of' in variables.lbl && variables.lbl['app.kubernetes.io/part-of'] != '' &&
        'app.kubernetes.io/managed-by' in variables.lbl && variables.lbl['app.kubernetes.io/managed-by'] == '{{ .Values.namespaceMetadata.managedBy }}'
      message: "app-*/tool-* namespaces must set recommended app.kubernetes.io/* labels (name, instance, version, component, part-of) with managed-by '{{ .Values.namespaceMetadata.managedBy }}'."
{{- end }}
