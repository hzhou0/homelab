apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-runtime-go
  namespace: app-test
spec:
  selector:
    matchLabels: {app: myapp}
  template:
    metadata:
      labels:
        app: myapp
        homelab.lab/runtime: go
    spec:
      containers:
        - name: app
          image: myapp:1.0.0
          resources:
            requests: {cpu: 50m, memory: 32Mi}
            limits:   {cpu: 500m, memory: 1000Mi}
---
apiVersion: apps/v1
