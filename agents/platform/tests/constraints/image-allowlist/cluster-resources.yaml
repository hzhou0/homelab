apiVersion: cli.kyverno.io/v1alpha1
kind: ClusterResource
metadata:
  name: image-allowlist-configmap
spec:
  resources:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: image-allowlist
        namespace: default
      data:
        images: "docker.io/rancher/kubectl:v1.30.2,quay.io/metallb/controller:v0.16.1"
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: app-test
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: tool-test
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: default
