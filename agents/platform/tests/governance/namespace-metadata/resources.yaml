# Fully-valid app-* namespace — passes both validations
apiVersion: v1
kind: Namespace
metadata:
  name: app-full-metadata
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/instance: myapp
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: myapp
    app.kubernetes.io/managed-by: operator-agent
  annotations:
    homelab.lab/src: "https://github.com/acme/myapp"
    homelab.lab/notes: "Full metadata, should pass both validations."
---
