# tool-operator namespace is exempt (matchCondition name != tool-operator) → skip
apiVersion: v1
kind: Namespace
metadata:
  name: tool-operator
---
# kube-system is not app-*/tool-* → matchCondition false → skip
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
