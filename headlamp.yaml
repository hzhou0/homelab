apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: headlamp-extra-read
  labels:
    # If you bound the built-in `view` role, this label auto-merges these rules
    # into it (aggregation) — the binding below is then just belt-and-suspenders.
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  - apiGroups: ["gateway.networking.k8s.io"]   # Gateways, GatewayClasses, HTTPRoutes, etc.
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]                             # PersistentVolumes are cluster-scoped
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattributesclasses", "csidrivers", "csinodes", "csistoragecapacities", "volumeattachments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-extra-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: headlamp-extra-read
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: tool-headlamp